<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Knowledge Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #FFD700 0%, #FFDF00 50%, #FFEA00 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* Top Bar for Navigation and Stats */
        .top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out;
        }

        .exit-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .exit-btn:hover {
            transform: scale(1.05);
            background: #ff6b81;
        }

        .stats-container {
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-weight: 800;
            font-size: 1.1rem;
        }

        .stat-correct { color: #2ed573; }
        .stat-wrong { color: #ff4757; }
        .stat-skip { color: #feca57; }

        /* Timer Circular UI */
        .timer-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulseTimer 1s infinite alternate;
        }

        .timer-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #111;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 2rem;
            color: #111;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .timer-warning {
            border-color: #ff4757;
            color: #ff4757;
            animation: shake 0.5s infinite;
        }

        /* Quiz Box */
        .quiz-box {
            background-color: #111111;
            color: #ffffff;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .question {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 30px;
            min-height: 60px; /* Prevent jitter when question changes */
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: linear-gradient(90deg, #1e1e1e, #2a2a2a);
            color: white;
            border: 2px solid #444;
            padding: 15px 25px;
            border-radius: 50px; 
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            position: relative;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.02);
            border-color: #FFD700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
            background: linear-gradient(90deg, #2a2a2a, #333);
        }
        
        /* Selected States */
        .option-btn.selected {
            border-color: #3498db;
            background: rgba(52, 152, 219, 0.2);
        }

        .option-btn.correct {
            border-color: #2ed573;
            background: rgba(46, 213, 115, 0.2);
        }

        .option-btn.wrong {
            border-color: #ff4757;
            background: rgba(255, 71, 87, 0.2);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .option-label {
            font-weight: 800;
            color: #FFD700;
            margin-right: 20px;
            min-width: 25px;
        }

        /* Bottom Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .control-btn {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .skip-btn {
            background: #444;
            color: white;
        }

        .skip-btn:hover:not(:disabled) { background: #555; }

        .submit-btn {
            background: #FFD700;
            color: #111;
        }

        .submit-btn:hover:not(:disabled) {
            background: #FFEA00;
            transform: scale(1.02);
        }
        
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseTimer {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @media (max-width: 600px) {
            .quiz-box { padding: 20px; }
            .question { font-size: 1.2rem; }
            .option-btn { padding: 12px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="exit-btn" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-arrow-left"></i> EXIT
        </button>
        <div class="stats-container">
            <span class="stat-correct" title="Correct"><i class="fa-solid fa-check"></i> <span id="score-right">0</span></span>
            <span class="stat-wrong" title="Wrong"><i class="fa-solid fa-xmark"></i> <span id="score-wrong">0</span></span>
            <span class="stat-skip" title="Skipped"><i class="fa-solid fa-forward-step"></i> <span id="score-skip">0</span></span>
        </div>
    </div>

    <div class="timer-container" id="timer-container" style="display: none;">
        <div class="timer-circle" id="timer">15</div>
    </div>

    <!-- Centered Loader -->
    <div id="initial-loader" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh;">
        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 3rem; color: #111; margin-bottom: 20px;"></i>
        <h2 style="color: #111;" id="loader-text">Loading endless questions...</h2>
    </div>

    <div class="quiz-box" id="quiz-box" style="display: none;">
        <div class="question" id="question-text">Loading question...</div>
        <div class="options" id="options-container">
            <!-- Options will be injected by JS -->
        </div>
        
        <div class="controls">
            <button class="control-btn skip-btn" id="skip-btn" onclick="skipQuestion()">Skip</button>
            <button class="control-btn submit-btn" id="submit-btn" onclick="submitAnswer()" disabled>Submit</button>
        </div>
    </div>

    <script>
        // Core Variables
        let questionQueue = [];
        let currentQ = null;
        let selectedOptionIndex = null;
        let timeLeft = 15;
        let timerInterval;
        let scoreCorrect = 0;
        let scoreWrong = 0;
        let scoreSkipped = 0;
        let isFetching = false;

        // Elements
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const timerElement = document.getElementById('timer');
        const submitBtn = document.getElementById('submit-btn');
        const skipBtn = document.getElementById('skip-btn');
        const scoreRightElement = document.getElementById('score-right');
        const scoreWrongElement = document.getElementById('score-wrong');
        const scoreSkipElement = document.getElementById('score-skip');

        const labels = ['A', 'B', 'C', 'D'];

        // Determine Category, Language and Time from URL
        const urlParams = new URLSearchParams(window.location.search);
        const categoryParam = urlParams.get('category') || 'gk'; // Default to gk
        const langParam = urlParams.get('lang') || localStorage.getItem('selectedLang') || 'en'; // Default to en
        const timeParam = parseInt(urlParams.get('time') || localStorage.getItem('selectedTime')) || 15; // Default to 15 seconds if undefined

        // Persistent Seen Questions Storage
        // If it's gk and we have a specific topic, scope the storage key to that topic
        const subTopicParam = urlParams.get('topic');
        const storageKey = subTopicParam ? `seenQuestions_${categoryParam}_${subTopicParam}` : `seenQuestions_${categoryParam}`;
        
        const savedSeen = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const seenQuestions = new Set(savedSeen);

        function saveSeen() {
            localStorage.setItem(storageKey, JSON.stringify(Array.from(seenQuestions)));
        }
        
        // Static UI Translations
        const staticTranslations = {
            'en': {
                'title': { 'gk': 'General Knowledge Quiz', 'upsc': 'UPSC Quiz', 'tnpsc': 'TNPSC Quiz', 'rbi': 'Railway Recruitment Board (RRB) Quiz', 'communication': 'Communication Quiz' },
                'loading': 'Loading endless questions...',
                'fetching': 'Fetching more endless questions...',
                'translating': 'Translating...',
                'skip': 'Skip',
                'submit': 'Submit',
                'next': 'Next Question',
                'completed': 'Quiz Completed! 🎉',
                'correct': 'Correct',
                'wrong': 'Wrong/Skipped',
                'home': 'Return to Home'
            },
            'hi': {
                'title': { 'gk': 'सामान्य ज्ञान प्रश्नोत्तरी', 'upsc': 'UPSC प्रश्नोत्तरी', 'tnpsc': 'TNPSC प्रश्नोत्तरी', 'rbi': 'Railway Recruitment Board (RRB) प्रश्नोत्तरी', 'communication': 'Communication Quiz' },
                'loading': 'अनंत प्रश्न लोड हो रहे हैं...',
                'fetching': 'और प्रश्न लाए जा रहे हैं...',
                'translating': 'अनुवाद हो रहा है...',
                'skip': 'छोड़ें',
                'submit': 'जमा करें',
                'next': 'अगला प्रश्न',
                'completed': 'प्रश्नोत्तरी पूर्ण! 🎉',
                'correct': 'सही',
                'wrong': 'गलत/छोड़े गए',
                'home': 'होम पर लौटें'
            },
            'ta': {
                'title': { 'gk': 'பொது அறிவு வினாடி வினா', 'upsc': 'UPSC வினாடி வினா', 'tnpsc': 'TNPSC வினாடி வினா', 'rbi': 'Railway Recruitment Board (RRB) வினாடி வினா', 'communication': 'Communication Quiz' },
                'loading': 'கேள்விகள் ஏற்றப்படுகிறன...',
                'fetching': 'மேலும் கேள்விகள் ஏற்றப்படுகிறன...',
                'translating': 'மொழிபெயர்க்கப்படுகிறது...',
                'skip': 'தவிர்',
                'submit': 'சமர்ப்பி',
                'next': 'அடுத்த கேள்வி',
                'completed': 'வினாடி வினா முடிந்தது! 🎉',
                'correct': 'சரி',
                'wrong': 'தவறு/தவிர்க்கப்பட்டது',
                'home': 'முகப்புக்குத் திரும்பு'
            }
        };

        const t = staticTranslations[langParam] || staticTranslations['en'];

        // Let's set the page title and initial buttons dynamically
        document.title = t.title[categoryParam] || t.title['gk'];
        skipBtn.innerText = t.skip;
        submitBtn.innerText = t.submit;
        
        // Translate exit button text implicitly
        document.querySelector('.exit-btn').innerHTML = `<i class="fa-solid fa-arrow-left"></i> ${langParam === 'hi' ? 'बाहर निकलें' : (langParam === 'ta' ? 'வெளியேறு' : 'EXIT')}`;

        // Utility to decode HTML entities from the API
        function decodeHTML(html) {
            const txt = document.createElement('textarea');
            txt.innerHTML = html;
            return txt.value;
        }

        // Unofficial Google Translate API (Free, Client-Side Proxy)
        async function translateText(text) {
            if (langParam === 'en') return text;
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${langParam}&dt=t&q=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                const data = await res.json();
                return data[0].map(item => item[0]).join('');
            } catch(e) {
                console.error("Translation fail", e);
                return text; // Fallback to English 
            }
        }

        let globalExternalDB = null;

        function loadScript(url) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = url;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function fetchQuestions() {
            if (isFetching) return;
            isFetching = true;

            let externalDB = null;
            if (globalExternalDB) {
                externalDB = globalExternalDB;
            } else {
                try {
                    if (categoryParam === 'communication') {
                        await loadScript('communication_db.js');
                        globalExternalDB = window.COMM_DB;
                    } else {
                        await loadScript('questions_database.js');
                        globalExternalDB = window.EXTERNAL_DB;
                    }
                    externalDB = globalExternalDB;
                } catch (e) { console.log('External DB not found or script load failed.', e); }
            }

            const mapQuestions = (list) => {
                return list.map(q => {
                    let questionText = q.question;
                    let incorrect = q.incorrect_answers;
                    let correct = q.correct_answer;
                    let isTranslated = false;

                    // Support bilingual fields (question_en, question_ta, etc.)
                    if (langParam === 'ta' && q.question_ta) {
                        questionText = q.question_ta;
                        incorrect = q.incorrect_answers_ta;
                        correct = q.correct_answer_ta;
                        isTranslated = true;
                    } else if (q.question_en) {
                        questionText = q.question_en;
                        incorrect = q.incorrect_answers_en;
                        correct = q.correct_answer_en;
                        isTranslated = true;
                    }

                    const options = [...incorrect, correct].map(decodeHTML);
                    // Shuffle options
                    for (let i = options.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [options[i], options[j]] = [options[j], options[i]];
                    }
                    return {
                        question: decodeHTML(questionText),
                        options: options,
                        correctAnswer: options.indexOf(decodeHTML(correct)),
                        translated: isTranslated
                    };
                });
            };

            const pickBatch = (localList, exKeys, count = 10) => {
                const combinedRaw = [];
                // Unseen from local
                if (localList && localList.length > 0) {
                    let unseenLocal = localList.filter(q => {
                        let txt = q.question || q.question_en;
                        return txt && !seenQuestions.has(decodeHTML(txt));
                    });
                    if (unseenLocal.length === 0) {
                        unseenLocal = localList;
                        seenQuestions.clear();
                        saveSeen();
                    }
                    // Shuffle local and take up to 'count'
                    for (let i = unseenLocal.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [unseenLocal[i], unseenLocal[j]] = [unseenLocal[j], unseenLocal[i]];
                    }
                    combinedRaw.push(...unseenLocal.slice(0, count));
                }
                
                // Unseen from external
                let keys = Array.isArray(exKeys) ? exKeys : [exKeys];
                keys.forEach(key => {
                    if (externalDB && key && externalDB[key]) {
                        const rawArr = externalDB[key];
                        let selectedData = [];
                        let attempts = 0;
                        while (selectedData.length < count && attempts < count * 5) {
                            const idx = Math.floor(Math.random() * rawArr.length);
                            const q = rawArr[idx];
                            let txt = q.question || q.question_en;
                            if (txt && !seenQuestions.has(decodeHTML(txt))) {
                                selectedData.push(q);
                                seenQuestions.add(decodeHTML(txt)); // temporary add to prevent dupes in selection
                            }
                            attempts++;
                        }
                        if (selectedData.length === 0 && rawArr.length > 0) {
                            seenQuestions.clear();
                            saveSeen();
                            attempts = 0;
                            while (selectedData.length < count && attempts < count * 5) {
                                const idx = Math.floor(Math.random() * rawArr.length);
                                const q = rawArr[idx];
                                if (!selectedData.includes(q)) selectedData.push(q);
                                attempts++;
                            }
                        }
                        combinedRaw.push(...selectedData);
                    }
                });

                if (combinedRaw.length === 0) return [];
                
                // Final shuffle to mix Local and External
                for (let i = combinedRaw.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [combinedRaw[i], combinedRaw[j]] = [combinedRaw[j], combinedRaw[i]];
                }
                
                const finalRaw = combinedRaw.slice(0, count);
                const mapped = mapQuestions(finalRaw);
                mapped.forEach(m => seenQuestions.add(m.question));
                return mapped;
            };

            try {
                // Determine source: If UPSC, use local custom syllabus-based questions
                if (categoryParam === 'upsc') {
                    let upscQuestions = [
                        // Core Indian Polity
                        { question: "Under which Article of the Indian Constitution can the President dissolve the Lok Sabha?", incorrect_answers: ["Article 75", "Article 81", "Article 356"], correct_answer: "Article 85" },
                        { question: "The 'Basic Structure Doctrine' of the Indian Constitution was established in which landmark judgement?", incorrect_answers: ["Golaknath case", "Minerva Mills case", "Berubari Union case"], correct_answer: "Kesavananda Bharati case" },
                        { question: "Who holds the power to increase the number of judges in the Supreme Court of India?", incorrect_answers: ["President of India", "Chief Justice of India", "Law Commission"], correct_answer: "Parliament" },
                        
                        // Economy
                        { question: "Which of the following curves shows the inverse relationship between unemployment and the rate of inflation?", incorrect_answers: ["Laffer Curve", "Lorenz Curve", "Kuznets Curve"], correct_answer: "Phillips Curve" },
                        { question: "In computing the human development index (HDI), which of the following is NOT taken into account?", incorrect_answers: ["Life expectancy at birth", "Expected years of schooling", "Gross National Income per capita"], correct_answer: "Infant Mortality Rate" },
                        { question: "What is the primary objective of the 'Fiscal Responsibility and Budget Management (FRBM) Act'?", incorrect_answers: ["To print more currency", "To increase foreign direct investment", "To privatize public sector banks"], correct_answer: "To reduce fiscal deficit and ensure macroeconomic stability" },
                        
                        // Environment & Geography
                        { question: "Which atmospheric layer contains the ozone layer that protects the Earth from harmful UV radiation?", incorrect_answers: ["Troposphere", "Mesosphere", "Thermosphere"], correct_answer: "Stratosphere" },
                        { question: "The 'Cartagena Protocol' is an international agreement related to:", incorrect_answers: ["Ozone Depletion", "Climate Change Reduction", "Marine Pollution"], correct_answer: "Biosafety of living modified organisms (LMOs)" },
                        { question: "Which Indian state shares boundaries with the maximum number of other states?", incorrect_answers: ["Madhya Pradesh", "Maharashtra", "Assam"], correct_answer: "Uttar Pradesh" },
                        
                        // History & Culture
                        { question: "Who established the 'Ramakrishna Mission' in 1897?", incorrect_answers: ["Ramakrishna Paramahamsa", "Dayananda Saraswati", "Raja Ram Mohan Roy"], correct_answer: "Swami Vivekananda" },
                        { question: "During the Indian freedom struggle, who led the 'Salt Satyagraha' in Tamil Nadu (Vedaranyam March)?", incorrect_answers: ["K. Kamaraj", "Subramaniya Siva", "V.O. Chidambaram Pillai"], correct_answer: "C. Rajagopalachari" },
                        { question: "The Harappan civilization site of 'Lothal' is famous primarily for being what?", incorrect_answers: ["The largest city of the civilization", "A major religious center", "An extensive agricultural hub"], correct_answer: "A dockyard town" },
                        
                        // Science & Tech
                        { question: "In the context of space technology, what kind of orbit allows a satellite to appear stationary relative to a point on Earth?", incorrect_answers: ["Sun-synchronous orbit", "Low Earth Orbit (LEO)", "Polar orbit"], correct_answer: "Geostationary orbit" },
                        { question: "Which technology forms the fundamental basis of cryptocurrencies like Bitcoin?", incorrect_answers: ["Quantum Computing", "Deep Learning", "Cloud Storage"], correct_answer: "Blockchain" },
                        { question: "What is 'CRISPR-Cas9' primarily used for in modern biotechnology?", incorrect_answers: ["Creating synthetic fuels", "Enhancing Wi-Fi signals", "Purifying drinking water"], correct_answer: "Gene editing" }
                    ];
                    
                    const combined = pickBatch(upscQuestions, 'upsc', 10);
                    
                    // ALSO fetch from online API to meet the "unlimited question from online" requirement (UPSC usually hard/history)
                    let onlineQuestions = [];
                    try {
                        const response = await fetch('https://opentdb.com/api.php?amount=10&category=23&type=multiple&difficulty=hard');
                        const data = await response.json();
                        if (data.results) {
                            onlineQuestions = data.results.map(q => {
                                const options = [...q.incorrect_answers, q.correct_answer].map(decodeHTML);
                                // Shuffle options
                                for (let i = options.length - 1; i > 0; i--) {
                                    const j = Math.floor(Math.random() * (i + 1));
                                    [options[i], options[j]] = [options[j], options[i]];
                                }
                                return {
                                    question: decodeHTML(q.question),
                                    options: options,
                                    correctAnswer: options.indexOf(decodeHTML(q.correct_answer)),
                                    translated: false
                                };
                            });
                        }
                    } catch (e) {
                        console.error("Failed to fetch online UPSC questions", e);
                    }

                    // Push unseen online questions
                    onlineQuestions.forEach(q => {
                        if (!seenQuestions.has(q.question)) {
                            seenQuestions.add(q.question);
                            combined.push(q);
                        }
                    });
                    
                    // Shuffle the combined set
                    for (let i = combined.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [combined[i], combined[j]] = [combined[j], combined[i]];
                    }

                    questionQueue.push(...combined);

                } else if (categoryParam === 'tnpsc') {
                    // Custom TNPSC Syllabus Questions divided by Group
                    let tnpscQuestions = [];
                    let localQuestions = [];
                    let externalKey = null;

                    if (subTopicParam === 'group1') {
                        externalKey = 'tnpsc_group1';
                        localQuestions = [
                            // --- History, Culture & Indian National Movement (INM) ---
                            { question: "Who was the founder of the Chola Empire?", incorrect_answers: ["Raja Raja Chola", "Rajendra Chola", "Karikala Chola"], correct_answer: "Vijayalaya Chola" },
                            { question: "Which Chola king built the Brihadisvara Temple at Thanjavur?", incorrect_answers: ["Rajendra Chola I", "Karikala Chola", "Vijayalaya Chola"], correct_answer: "Raja Raja Chola I" },

                            { question: "Where is the main headquarters of NATO located?", incorrect_answers: ["Washington D.C., USA", "Berlin, Germany", "London, UK"], correct_answer: "Brussels, Belgium" },
                            
                            // WTO & Economic Development
                            { question: "Which global organization deals with the global rules of trade between nations?", incorrect_answers: ["International Monetary Fund", "World Bank", "United Nations"], correct_answer: "World Trade Organization (WTO)" },
                            { question: "The World Bank's primary function is to:", incorrect_answers: ["Set global interest rates", "Regulate stock markets", "Print international currency"], correct_answer: "Provide loans and grants for capital projects in poorer countries" },
                            { question: "Which institution works to secure financial stability, facilitate international trade, and reduce global poverty?", incorrect_answers: ["WTO", "OECD", "G20"], correct_answer: "International Monetary Fund (IMF)" },
                            
                            // Humanitarian Aid & Peacekeeping
                            { question: "UN Peacekeepers are often distinguished by the color of their helmets. What color is it?", incorrect_answers: ["White", "Green", "Red"], correct_answer: "Blue" },
                            { question: "Which international organization provides emergency assistance, disaster relief, and education worldwide, focusing heavily on mothers and children?", incorrect_answers: ["UNESCO", "WHO", "UNHCR"], correct_answer: "UNICEF" },
                            { question: "Which organization is mandated to aid and protect refugees, forcibly displaced communities, and stateless people?", incorrect_answers: ["Amnesty International", "Red Cross", "Human Rights Watch"], correct_answer: "UNHCR" },
                            { question: "The International Committee of the Red Cross (ICRC) has a special mandate based on which treaties?", incorrect_answers: ["The Treaty of Versailles", "The Paris Agreement", "The Kyoto Protocol"], correct_answer: "The Geneva Conventions" },
                            
                            // Environmental Regulation
                            { question: "Which international agreement aimed to reduce ozone-depleting substances?", incorrect_answers: ["Kyoto Protocol", "Paris Agreement", "Copenhagen Accord"], correct_answer: "Montreal Protocol" },
                            { question: "The UN Environment Programme (UNEP) is headquartered in which city?", incorrect_answers: ["Geneva", "New York", "Paris"], correct_answer: "Nairobi, Kenya" },
                            { question: "Which global environmental treaty specifically aims to hold the increase in the global average temperature to well below 2°C?", incorrect_answers: ["Kyoto Protocol", "Montreal Protocol", "Rio Declaration"], correct_answer: "Paris Agreement" }
                        ];

                        const combined = pickBatch(orgQuestions, ['gk_intl_orgs', 'gk_organizations'], 10);
                        questionQueue.push(...combined);

                    } else {
                        // If a specific topic ID was passed, use it. Otherwise, default to 9 (General Knowledge)
                        const categoryId = gkCatIdParams ? gkCatIdParams : '9';
                        let apiUrl = `https://opentdb.com/api.php?amount=10&category=${categoryId}&type=multiple`;
    
                        try {
                            const response = await fetch(apiUrl);
                            const data = await response.json();
                            
                            if (data.results) {
                                const newQuestions = data.results.map(q => {
                                    const options = [...q.incorrect_answers, q.correct_answer].map(decodeHTML);
                                    // Shuffle options
                                    for (let i = options.length - 1; i > 0; i--) {
                                        const j = Math.floor(Math.random() * (i + 1));
                                        [options[i], options[j]] = [options[j], options[i]];
                                    }
                                    return {
                                        question: decodeHTML(q.question),
                                        options: options,
                                        correctAnswer: options.indexOf(decodeHTML(q.correct_answer)),
                                        translated: false
                                    };
                                });
                                
                                const dbQuestions = pickBatch([], 'gk_general', 5);
                                newQuestions.push(...dbQuestions);
                                
                                // Shuffle everything
                                for (let i = newQuestions.length - 1; i > 0; i--) {
                                    const j = Math.floor(Math.random() * (i + 1));
                                    [newQuestions[i], newQuestions[j]] = [newQuestions[j], newQuestions[i]];
                                }
                                
                                let uniqueGK = newQuestions.filter(q => !seenQuestions.has(q.question));
                                
                                // Reset logic if the API starts looping or is exhausted
                                if (uniqueGK.length === 0 && newQuestions.length > 0) {
                                    seenQuestions.clear();
                                    saveSeen();
                                    uniqueGK = newQuestions;
                                }
                                
                                uniqueGK.forEach(q => {
                                    seenQuestions.add(q.question);
                                });
                                
                                questionQueue.push(...uniqueGK);
                            }
                        } catch (e) {
                            console.error("API Fetch Error in Catchall:", e);
                        }
                    }
                }
            } catch (err) {
                console.error("Failed to fetch questions", err);
            } finally {
                saveSeen(); // Save state after fetching
                isFetching = false;
                // If we were waiting for questions to load
                if (!currentQ && questionQueue.length > 0) {
                    currentQ = questionQueue.shift();
                    await prepareAndLoadQuestion();
                } else if (!currentQ) {
                    // Retry on failure
                    setTimeout(fetchQuestions, 2000);
                }
            }
        }

        async function initQuiz() {
            document.getElementById('loader-text').innerText = t.loading;
            await fetchQuestions();
            
            // Explicitly load the first question if it wasn't triggered
            if (!currentQ && questionQueue.length > 0) {
                await nextQuestion();
            }
        }

        async function prepareAndLoadQuestion() {
            // Check if we need to translate dynamically first
            if (langParam !== 'en' && !currentQ.translated) {
                document.getElementById('loader-text').innerText = t.translating;
                clearInterval(timerInterval);
                timerElement.innerText = "-";

                // Translate Question AND all Options concurrently
                currentQ.question = await translateText(currentQ.question);
                currentQ.options = await Promise.all(currentQ.options.map(opt => translateText(opt)));
                currentQ.translated = true;
            }
            
            // Now render the UI
            loadQuestionUI();
        }

        function loadQuestionUI() {
            // Reset state
            selectedOptionIndex = null;
            submitBtn.disabled = true;
            submitBtn.innerText = t.submit;
            submitBtn.onclick = submitAnswer;
            skipBtn.disabled = false;
            
            // Reveal UI, hide loader
            document.getElementById('initial-loader').style.display = 'none';
            document.getElementById('timer-container').style.display = 'block';
            document.getElementById('quiz-box').style.display = 'block';
            
            // Update UI
            questionText.innerText = currentQ.question;
            optionsContainer.innerHTML = ''; // Clear previous options
            
            // Render options
            currentQ.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-label">${labels[index]}:</span> ${option}`;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            // Start Timer
            startTimer();

            // Fetch more questions if we are running low to keep it continuous
            if (questionQueue.length < 3) {
                fetchQuestions();
            }
        }

        function selectOption(index) {
            // Prevent selection if disabled
            if (optionsContainer.children[0] && optionsContainer.children[0].disabled) return;
            
            selectedOptionIndex = index;
            submitBtn.disabled = false;

            // Visual update
            Array.from(optionsContainer.children).forEach((btn, i) => {
                btn.classList.remove('selected');
                if (i === index) {
                    btn.classList.add('selected');
                }
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = timeParam; // Use dynamic timer based on user selection
            timerElement.innerText = timeLeft;
            timerElement.className = 'timer-circle'; // Reset styling

            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.innerText = timeLeft;

                if (timeLeft <= 5 && timeLeft > 0) {
                    timerElement.classList.add('timer-warning');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerElement.innerText = "0";
                    handleTimeOut();
                }
            }, 1000);
        }

        function handleTimeOut() {
            // If they ran out of time, count it as wrong automatically
            scoreWrong++;
            updateScores();
            
            const buttons = Array.from(optionsContainer.children);
            
            // Disable all buttons and show correct answer
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === currentQ.correctAnswer) {
                    btn.classList.add('correct');
                }
            });

            // Flying effect for wrong
            createFlyingEffect('🐍');

            // Change submit to next button
            skipBtn.disabled = true;
            submitBtn.disabled = false;
            submitBtn.innerText = t.next;
            submitBtn.onclick = nextQuestion;
        }

        function submitAnswer() {
            clearInterval(timerInterval); // Stop timer
            
            const buttons = Array.from(optionsContainer.children);
            
            // Disable all buttons so user cannot change answer
            buttons.forEach(btn => btn.disabled = true);

            // Check if correct
            if (selectedOptionIndex === currentQ.correctAnswer) {
                buttons[selectedOptionIndex].classList.add('correct');
                scoreCorrect++;
                createFlyingEffect('🦋');
            } else {
                buttons[selectedOptionIndex].classList.add('wrong');
                // Highlight the correct one as well
                buttons[currentQ.correctAnswer].classList.add('correct');
                scoreWrong++;
                createFlyingEffect('🐍');
            }

            updateScores();

            // Transform Submit button into Next button
            skipBtn.disabled = true;
            submitBtn.innerText = t.next;
            submitBtn.onclick = nextQuestion;
        }

        function createFlyingEffect(emoji) {
            const container = document.body;
            for(let i=0; i<30; i++) {
                const el = document.createElement('div');
                el.innerText = emoji;
                el.style.position = 'fixed';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = '100vh';
                el.style.fontSize = (Math.random() * 20 + 20) + 'px';
                el.style.zIndex = '9999';
                el.style.pointerEvents = 'none';
                el.style.transition = `transform ${Math.random() * 2 + 2}s linear, top ${Math.random() * 2 + 2}s linear`;
                
                container.appendChild(el);
                
                setTimeout(() => {
                    el.style.top = '-10vh';
                    el.style.transform = `translateX(${(Math.random() - 0.5) * 500}px) rotate(${Math.random() * 360}deg)`;
                }, 50);

                setTimeout(() => {
                    if (el.parentNode) el.parentNode.removeChild(el);
                }, 4000);
            }
        }

        function skipQuestion() {
            clearInterval(timerInterval);
            // Treat skip as deliberately skipped, separate from wrong
            scoreSkipped++;
            updateScores();
            
            // Move on entirely
            nextQuestion();
        }

        async function nextQuestion() {
            if (questionQueue.length === 0) {
                // Wait for questions to be fetched
                questionText.innerText = t.fetching;
                optionsContainer.innerHTML = '';
                currentQ = null;
                clearInterval(timerInterval);
                timerElement.innerText = "-";
                fetchQuestions();
                return;
            }
            
            currentQ = questionQueue.shift();
            await prepareAndLoadQuestion();
        }

        function updateScores() {
            scoreRightElement.innerText = scoreCorrect;
            scoreWrongElement.innerText = scoreWrong;
            scoreSkipElement.innerText = scoreSkipped;
        }

        // Start the game on load
        window.onload = initQuiz;
    </script>
</body>
</html>
