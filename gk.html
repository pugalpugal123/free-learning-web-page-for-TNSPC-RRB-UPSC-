<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Knowledge Topics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #FFD700 0%, #FFDF00 50%, #FFEA00 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .top-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        .exit-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .exit-btn:hover {
            transform: scale(1.05);
            background: #ff6b81;
        }

        h1 {
            font-weight: 800;
            font-size: 3rem;
            color: #111111;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 40px 0;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.15);
            animation: slideDown 0.6s ease-out;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
            animation: fadeIn 0.8s ease-out 0.3s both;
            position: relative;
            z-index: 10;
        }

        .topic-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .topic-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.15);
            border-color: #ffd700;
            background: #ffffff;
        }

        .topic-icon {
            font-size: 2.5rem;
            color: #111111;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .topic-card:hover .topic-icon {
            transform: scale(1.15);
            color: #d4af37;
        }

        .topic-title {
            font-weight: 800;
            font-size: 1.1rem;
            color: #111111;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Animated Background Elements */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-icon {
            position: absolute;
            color: #000000;
            animation: floatUp linear infinite;
            bottom: -150px;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            15% { opacity: 0.1; }
            85% { opacity: 0.1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        .bg-icon:nth-child(1) { left: 10%; font-size: 3rem; animation-duration: 15s; animation-delay: 0s; }
        .bg-icon:nth-child(2) { left: 30%; font-size: 4rem; animation-duration: 22s; animation-delay: 2s; }
        .bg-icon:nth-child(3) { left: 50%; font-size: 2.5rem; animation-duration: 18s; animation-delay: 4s; }
        .bg-icon:nth-child(4) { left: 70%; font-size: 5rem; animation-duration: 25s; animation-delay: 1s; }
        .bg-icon:nth-child(5) { left: 85%; font-size: 3.5rem; animation-duration: 20s; animation-delay: 6s; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .topics-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .topic-card { padding: 20px 10px; }
            .topic-icon { font-size: 2rem; }
            .topic-title { font-size: 0.9rem; }
        }
    </style>
</head>

<body>
    <div class="bg-animation">
        <i class="fa-solid fa-monument bg-icon"></i>
        <i class="fa-solid fa-earth-americas bg-icon"></i>
        <i class="fa-solid fa-flask bg-icon"></i>
        <i class="fa-solid fa-scale-balanced bg-icon"></i>
        <i class="fa-solid fa-medal bg-icon"></i>
    </div>

    <div class="top-bar">
        <button class="exit-btn" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-arrow-left"></i> BACK
        </button>
    </div>

    <h1 id="page-title">General Knowledge</h1>

    <div class="topics-grid">
        <div class="topic-card" onclick="startTopicQuiz('history', 23)">
            <i class="fa-solid fa-monument topic-icon"></i>
            <div class="topic-title" id="title-history">History</div>
        </div>
        <div class="topic-card" onclick="startTopicQuiz('geography', 22)">
            <i class="fa-solid fa-earth-americas topic-icon"></i>
            <div class="topic-title" id="title-geography">Geography</div>
        </div>
        <div class="topic-card" onclick="startTopicQuiz('science', 17)">
            <i class="fa-solid fa-flask topic-icon"></i>
            <div class="topic-title" id="title-science">Science & Tech</div>
        </div>
        <div class="topic-card" onclick="startTopicQuiz('politics', 24)">
            <i class="fa-solid fa-scale-balanced topic-icon"></i>
            <div class="topic-title" id="title-politics">Politics</div>
        </div>
        <div class="topic-card" onclick="startTopicQuiz('sports', 21)">
            <i class="fa-solid fa-medal topic-icon"></i>
            <div class="topic-title" id="title-sports">Sports</div>
        </div>
        <div class="topic-card" onclick="startTopicQuiz('literature', 10)">
            <i class="fa-solid fa-book-open-reader topic-icon"></i>
            <div class="topic-title" id="title-literature">Literature</div>
        </div>
        <div class="topic-card" onclick="startTopicQuiz('art', 25)">
            <i class="fa-solid fa-palette topic-icon"></i>
            <div class="topic-title" id="title-art">Arts & Culture</div>
        </div>
        <div class="topic-card" onclick="startTopicQuiz('organizations', 9)">
            <!-- Category 9 is General Knowledge in OpenTDB, combining multiple topics as a fallback for international orgs -->
            <i class="fa-solid fa-handshake-angle topic-icon"></i>
            <div class="topic-title" id="title-orgs">Int. Organizations</div>
        </div>
    </div>

    <script>
        // Get URL parameters passed from index.html (Language and Time)
        const urlParams = new URLSearchParams(window.location.search);
        const langParam = urlParams.get('lang') || localStorage.getItem('selectedLang') || 'en';
        const timeParam = urlParams.get('time') || localStorage.getItem('selectedTime') || 15;

        // Simple translations for the titles and exit button based on language
        const translations = {
            'en': {
                'pageTitle': 'General Knowledge',
                'backBtn': 'BACK',
                'history': 'History',
                'geography': 'Geography',
                'science': 'Science & Tech',
                'politics': 'Politics',
                'sports': 'Sports',
                'literature': 'Literature',
                'art': 'Arts & Culture',
                'orgs': 'Int. Organizations'
            },
            'ta': {
                'pageTitle': 'பொது அறிவு',
                'backBtn': 'திரும்பு',
                'history': 'வரலாறு',
                'geography': 'புவியியல்',
                'science': 'அறிவியல் மற்றும் தொழில் நுட்பம்',
                'politics': 'அரசியல்',
                'sports': 'விளையாட்டு',
                'literature': 'இலக்கியம்',
                'art': 'கலை & பண்பாடு',
                'orgs': 'சர்வதேச அமைப்புகள்'
            },
            'hi': {
                'pageTitle': 'सामान्य ज्ञान',
                'backBtn': 'वापस',
                'history': 'इतिहास',
                'geography': 'भूगोल',
                'science': 'विज्ञान और प्रौद्योगिकी',
                'politics': 'राजनीति',
                'sports': 'खेल',
                'literature': 'साहित्य',
                'art': 'कला और संस्कृति',
                'orgs': 'अंतर्राष्ट्रीय संगठन'
            }
        };

        const t = translations[langParam] || translations['en'];

        // Apply translations
        document.getElementById('page-title').innerText = t.pageTitle;
        document.querySelector('.exit-btn').innerHTML = `<i class="fa-solid fa-arrow-left"></i> ${t.backBtn}`;
        document.getElementById('title-history').innerText = t.history;
        document.getElementById('title-geography').innerText = t.geography;
        document.getElementById('title-science').innerText = t.science;
        document.getElementById('title-politics').innerText = t.politics;
        document.getElementById('title-sports').innerText = t.sports;
        document.getElementById('title-literature').innerText = t.literature;
        document.getElementById('title-art').innerText = t.art;
        document.getElementById('title-orgs').innerText = t.orgs;

        function startTopicQuiz(topic, tdCategory) {
            // Encode the subtopic category number so the quiz page knows to fetch something specific
            // Using existing `gk` category param, but storing specific topic in URL
            window.location.href = `countdown.html?category=gk&topic=${topic}&gkCatId=${tdCategory}&lang=${langParam}&time=${timeParam}`;
        }
    </script>
</body>

</html>
