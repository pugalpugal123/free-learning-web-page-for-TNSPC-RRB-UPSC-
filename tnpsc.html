<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="_CgjtjpKAfAjT89F6ZVdYQba0RSRz-z4dI192zmDa-I" />
    <title>TNPSC Topics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #FFD700 0%, #FFDF00 50%, #FFEA00 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .top-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        .exit-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .exit-btn:hover {
            transform: scale(1.05);
            background: #ff6b81;
        }

        h1 {
            font-weight: 800;
            font-size: 3rem;
            color: #111111;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 40px 0;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.15);
            animation: slideDown 0.6s ease-out;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
            animation: fadeIn 0.8s ease-out 0.3s both;
            position: relative;
            z-index: 10;
        }

        .topic-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .topic-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.15);
            border-color: #ffd700;
            background: #ffffff;
        }

        .topic-icon {
            font-size: 2.5rem;
            color: #111111;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .topic-card:hover .topic-icon {
            transform: scale(1.15);
            color: #d4af37;
        }

        .topic-title {
            font-weight: 800;
            font-size: 1.1rem;
            color: #111111;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Animated Background Elements */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-icon {
            position: absolute;
            color: #000000;
            animation: floatUp linear infinite;
            bottom: -150px;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            15% {
                opacity: 0.1;
            }

            85% {
                opacity: 0.1;
            }

            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }

        .bg-icon:nth-child(1) {
            left: 10%;
            font-size: 3rem;
            animation-duration: 15s;
            animation-delay: 0s;
        }

        .bg-icon:nth-child(2) {
            left: 30%;
            font-size: 4rem;
            animation-duration: 22s;
            animation-delay: 2s;
        }

        .bg-icon:nth-child(3) {
            left: 50%;
            font-size: 2.5rem;
            animation-duration: 18s;
            animation-delay: 4s;
        }

        .bg-icon:nth-child(4) {
            left: 70%;
            font-size: 5rem;
            animation-duration: 25s;
            animation-delay: 1s;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }

            .topics-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .topic-card {
                padding: 20px 10px;
            }

            .topic-icon {
                font-size: 2rem;
            }

            .topic-title {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation">
        <i class="fa-solid fa-briefcase bg-icon"></i>
        <i class="fa-solid fa-users-gear bg-icon"></i>
        <i class="fa-solid fa-file-signature bg-icon"></i>
        <i class="fa-solid fa-user-tie bg-icon"></i>
    </div>

    <div class="top-bar">
        <button class="exit-btn" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-arrow-left"></i> <span id="back-btn-text">BACK</span>
        </button>
    </div>

    <h1 id="page-title">TNPSC Categories</h1>

    <div class="topics-grid">
        <div class="topic-card" onclick="startTopicQuiz('group1')">
            <i class="fa-solid fa-briefcase topic-icon"></i>
            <div class="topic-title">Group 1</div>
        </div>
        <div class="topic-card" onclick="startTopicQuiz('group2')">
            <i class="fa-solid fa-users-gear topic-icon"></i>
            <div class="topic-title">Group 2 / 2A</div>
        </div>
        <div class="topic-card" onclick="startTopicQuiz('group3')">
            <i class="fa-solid fa-file-signature topic-icon"></i>
            <div class="topic-title">Group 3</div>
        </div>
        <div class="topic-card" onclick="startTopicQuiz('group4')">
            <i class="fa-solid fa-user-tie topic-icon"></i>
            <div class="topic-title">Group 4 & VAO</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const langParam = urlParams.get('lang') || localStorage.getItem('selectedLang') || 'en';
        const timeParam = urlParams.get('time') || localStorage.getItem('selectedTime') || 15;

        // Simple translations
        const translations = {
            'en': {
                'pageTitle': 'TNPSC Categories',
                'backBtn': 'BACK'
            },
            'ta': {
                'pageTitle': 'TNPSC பிரிவுகள்',
                'backBtn': 'திரும்பு'
            },
            'hi': {
                'pageTitle': 'TNPSC श्रेणियां',
                'backBtn': 'वापस'
            }
        };

        const t = translations[langParam] || translations['en'];

        // Apply translations
        document.getElementById('page-title').innerText = t.pageTitle;
        document.getElementById('back-btn-text').innerText = t.backBtn;

        function startTopicQuiz(topic) {
            window.location.href = `countdown.html?category=tnpsc&topic=${topic}&lang=${langParam}&time=${timeParam}`;
        }
    </script>
</body>

</html>
